<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FFB6C1">
<title>給媽媽的禮物 💝</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============ Reset & Base ============ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #FFF8F0;
    font-family: 'Noto Serif TC', 'Songti TC', 'PingFang TC', serif;
    color: #5A2F3F;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    overscroll-behavior: none;
  }

  #app {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 480px;
    margin: 0 auto;
    overflow: hidden;
    background: #FFF8F0;
  }

  /* ============ Scene base ============ */
  .scene {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transform: scale(1.02);
    transition: opacity 0.6s ease, transform 0.6s ease, visibility 0s linear 0.6s;
    pointer-events: none;
    overflow: hidden;
  }
  .scene.active {
    opacity: 1;
    visibility: visible;
    transform: scale(1);
    pointer-events: auto;
    transition: opacity 0.6s ease, transform 0.6s ease, visibility 0s;
  }

  /* ============ Hint text ============ */
  .hint {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-shadow: 0 2px 12px rgba(120, 30, 60, 0.5), 0 0 6px rgba(255,255,255,0.3);
    animation: hint-pulse 1.8s ease-in-out infinite;
    pointer-events: none;
    z-index: 25;
    white-space: nowrap;
  }
  .hint.dark {
    color: #5A2F3F;
    text-shadow: 0 2px 8px rgba(255,255,255,0.6);
  }
  @keyframes hint-pulse {
    0%, 100% { opacity: 0.55; transform: translateX(-50%) translateY(0); }
    50%      { opacity: 1;    transform: translateX(-50%) translateY(-5px); }
  }

  /* ============ Next-stage interaction widgets ============ */
  .next-stage {
    position: absolute;
    bottom: 36px;
    left: 50%;
    z-index: 30;
    opacity: 0;
    visibility: hidden;
    transform: translateX(-50%) translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease, visibility 0s linear 0.6s;
  }
  .next-stage.visible {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(0);
    transition: opacity 0.6s ease, transform 0.6s ease, visibility 0s;
  }
  .next-label {
    position: absolute;
    bottom: -22px;
    left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    color: rgba(91, 47, 63, 0.65);
    letter-spacing: 0.25em;
    pointer-events: none;
  }

  /* B: Full-screen scratch-off (Scene 2 → 3) */
  .fs-scratch {
    position: absolute;
    inset: 0;
    z-index: 50;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.6s ease, visibility 0s linear 0.6s;
  }
  .fs-scratch.visible {
    opacity: 1;
    visibility: visible;
    transition: opacity 0.6s ease, visibility 0s;
  }
  .fs-scratch.fading {
    opacity: 0;
    transition: opacity 0.7s ease, visibility 0s linear 0.7s;
    pointer-events: none;
  }
  #fs-scratch-canvas {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    touch-action: none;
    cursor: grab;
  }
  .fs-scratch-hint {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: #FFFCEE;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-shadow: 0 2px 10px rgba(120, 60, 20, 0.55), 0 0 6px rgba(255,255,255,0.3);
    animation: hint-pulse 1.6s ease-in-out infinite;
    pointer-events: none;
    z-index: 2;
    white-space: nowrap;
  }

  /* C: Ribbon untie */
  .ribbon-stage { width: 300px; height: 80px; }
  .ribbon-wrap { position: relative; width: 100%; height: 100%; }
  .ribbon-svg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    filter: drop-shadow(0 4px 8px rgba(180,120,60,0.3));
    pointer-events: none;
    overflow: visible;
  }
  #rloop-l, #rloop-r, #rknot, #rline-l, #rline-r {
    transition: opacity 0.6s ease, transform 0.9s cubic-bezier(.4,0,.2,1);
  }
  .ribbon-handle {
    position: absolute;
    top: 50%;
    width: 40px; height: 40px;
    margin-top: -20px;
    border-radius: 50%;
    background: rgba(255,255,255,0.94);
    color: #B47225;
    font-size: 14px; font-weight: 700;
    text-align: center; line-height: 40px;
    cursor: grab;
    touch-action: none;
    z-index: 5;
    box-shadow: 0 4px 14px rgba(180,100,30,0.4), inset 0 -2px 0 rgba(180,100,30,0.15);
    transition: background 0.2s ease, box-shadow 0.2s ease;
    user-select: none;
    -webkit-user-select: none;
  }
  .ribbon-handle.left  { left: 0; }
  .ribbon-handle.right { right: 0; }
  .ribbon-handle.dragging {
    background: #FFD9B3;
    cursor: grabbing;
    box-shadow: 0 6px 18px rgba(180,100,30,0.5);
  }

  /* D: Envelope shake */
  .envelope-stage {
    width: 200px; height: 130px;
    perspective: 700px;
  }
  .envelope {
    position: relative;
    width: 140px; height: 90px;
    margin: 0 auto;
    transform-style: preserve-3d;
    filter: drop-shadow(0 8px 16px rgba(120, 50, 80, 0.32));
  }
  .envelope.shaking { animation: env-shake 0.45s ease-in-out infinite; }
  @keyframes env-shake {
    0%,100% { transform: rotate(-3deg) translateX(-2px); }
    50%     { transform: rotate( 3deg) translateX( 2px); }
  }
  .env-body {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #FFF8F0 0%, #FFE0E8 100%);
    border: 1.5px solid #E8A0A0;
    border-radius: 5px;
    overflow: hidden;
  }
  .env-body::after {
    content: '';
    position: absolute;
    bottom: 25%;
    left: -2px; right: -2px;
    height: 1px;
    background: rgba(232, 160, 160, 0.4);
  }
  .env-flap {
    position: absolute;
    top: -1.5px;
    left: -1.5px;
    width: calc(100% + 3px);
    height: 50%;
    background: linear-gradient(135deg, #FFC8D4 0%, #F5A0B8 100%);
    border: 1.5px solid #E8A0A0;
    border-bottom: none;
    border-radius: 5px 5px 0 0;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top center;
    transition: transform 0.85s cubic-bezier(.4,0,.2,1);
    z-index: 3;
  }
  .envelope.opened .env-flap { transform: rotateX(-160deg); }
  .env-stamp {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 26px;
    opacity: 0;
    transition: opacity 0.5s ease 0.35s, transform 0.7s cubic-bezier(.2,.7,.2,1.2) 0.35s;
    z-index: 2;
  }
  .envelope.opened .env-stamp {
    opacity: 1;
    transform: translate(-50%, -130%) scale(1.35);
  }
  .env-shake-btn {
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    padding: 7px 22px;
    font-family: inherit;
    font-size: 13px;
    color: #8B3A4A;
    background: rgba(255,255,255,0.9);
    border: 1px solid rgba(232, 160, 160, 0.5);
    border-radius: 22px;
    box-shadow: 0 4px 12px rgba(232, 160, 160, 0.4);
    cursor: pointer;
    letter-spacing: 0.15em;
    transition: transform 0.15s ease;
  }
  .env-shake-btn:active { transform: translateX(-50%) scale(0.94); }
  .envelope.opened ~ .env-shake-btn { opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
  .env-burst {
    position: absolute;
    top: 45px; left: 50%;
    width: 0; height: 0;
    pointer-events: none;
    z-index: 4;
  }

  /* ============ Petal & particle layers ============ */
  .petal-layer, .hearts-layer, .sparkle-layer, .burst-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .petal {
    position: absolute;
    top: -30px;
    width: 16px; height: 16px;
    border-radius: 80% 0 80% 0;
    background: radial-gradient(ellipse at 30% 30%, #FFFFFF, #FF8FA0);
    animation: petal-fall linear forwards;
    opacity: 0.85;
    will-change: transform, opacity;
  }
  @keyframes petal-fall {
    0%   { transform: translateY(-30px) translateX(0) rotate(0deg);   opacity: 0; }
    8%   { opacity: 0.9; }
    100% { transform: translateY(110vh) translateX(var(--drift,0px)) rotate(720deg); opacity: 0; }
  }

  .heart {
    position: absolute;
    bottom: -24px;
    font-size: 18px;
    animation: heart-up linear forwards;
    will-change: transform, opacity;
    filter: drop-shadow(0 0 6px rgba(255,150,180,0.4));
  }
  @keyframes heart-up {
    0%   { transform: translateY(0) translateX(0) scale(0.6); opacity: 0; }
    15%  { opacity: 0.95; transform: translateY(-15vh) translateX(calc(var(--drift,0px) * 0.2)) scale(1); }
    100% { transform: translateY(-115vh) translateX(var(--drift,0px)) scale(0.7); opacity: 0; }
  }

  .sparkle {
    position: absolute;
    animation: sparkle-anim 3s ease-out forwards;
    will-change: transform, opacity;
    pointer-events: none;
  }
  @keyframes sparkle-anim {
    0%   { opacity: 0;   transform: translateY(0)    scale(0.3) rotate(0deg); }
    25%  { opacity: 1;   transform: translateY(-30px) scale(1.1) rotate(90deg); }
    100% { opacity: 0;   transform: translateY(-130px) scale(0.4) rotate(360deg); }
  }

  /* ============ Scene 1: Gift wrap to tear ============ */
  .scene-1 {
    background: radial-gradient(circle at 50% 30%, #FFE4E8 0%, #FFB6C1 55%, #E8A0A0 100%);
  }

  .gift-stage {
    position: relative;
    width: 220px; height: 240px;
    display: flex; align-items: center; justify-content: center;
  }
  .gift-box {
    position: relative;
    width: 200px; height: 180px;
    filter: drop-shadow(0 18px 28px rgba(120, 30, 60, 0.45));
    transition: transform 1.0s cubic-bezier(.4,.0,.2,1), opacity 0.8s ease;
    transform-origin: center bottom;
  }
  .gift-box .lid {
    position: absolute;
    top: 0; left: -12px; right: -12px; height: 56px;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.12) 0 6px, transparent 6px 14px),
      linear-gradient(135deg, #FF8FA0 0%, #E8607F 100%);
    border-radius: 4px 4px 2px 2px;
    box-shadow: inset 0 -6px 12px rgba(140, 40, 60, 0.35), inset 0 2px 0 rgba(255,255,255,0.25);
    transition: transform 0.9s cubic-bezier(.5,-0.4,.4,1.6), opacity 0.6s ease;
  }
  .gift-box .body {
    position: absolute;
    top: 56px; left: 0; right: 0; bottom: 0;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.10) 0 6px, transparent 6px 14px),
      linear-gradient(135deg, #FFB6C1 0%, #FF8FA0 100%);
    border-radius: 2px 2px 4px 4px;
    overflow: hidden;
    box-shadow: inset 0 8px 12px rgba(140,40,60,0.18);
  }
  .gift-box .ribbon-v {
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 28px;
    background: linear-gradient(90deg, #F7C57B 0%, #E5A155 50%, #B47225 100%);
    transform: translateX(-50%);
    box-shadow: 0 0 6px rgba(120,60,20,0.3);
  }
  .gift-box .ribbon-h {
    position: absolute;
    top: 50%; left: -12px; right: -12px; height: 18px;
    background: linear-gradient(180deg, #F7C57B 0%, #E5A155 50%, #B47225 100%);
    transform: translateY(-50%);
    box-shadow: 0 0 6px rgba(120,60,20,0.3);
  }
  .bow {
    position: absolute;
    top: -34px; left: 50%;
    transform: translateX(-50%);
    width: 90px; height: 50px;
    z-index: 3;
  }
  .bow-loop {
    position: absolute;
    top: 4px;
    width: 36px; height: 32px;
    background: radial-gradient(ellipse at 30% 30%, #FFE3B0, #E5A155 70%, #B47225);
    box-shadow: inset 0 -4px 6px rgba(120,60,20,0.3);
  }
  .bow-loop.left  { left: 0;  border-radius: 60% 40% 60% 40%; transform: rotate(-18deg); }
  .bow-loop.right { right: 0; border-radius: 40% 60% 40% 60%; transform: rotate(18deg); }
  .bow-knot {
    position: absolute;
    left: 50%; top: 10px;
    transform: translateX(-50%);
    width: 18px; height: 22px;
    background: linear-gradient(180deg, #F7C57B, #B47225);
    border-radius: 4px;
    box-shadow: inset 0 0 4px rgba(120,60,20,0.4);
  }

  /* Opened state — swipe up triggers this */
  .gift-box.opened {
    transform: scale(0.6) translateY(40px);
    opacity: 0;
    transition: transform 1.1s cubic-bezier(.4,0,.2,1) 0.05s, opacity 0.9s ease 0.15s;
  }
  .gift-box.opened .lid {
    transform: translateY(-280px) rotate(22deg) scale(1.15);
    opacity: 0;
    transition: transform 0.95s cubic-bezier(.45,-0.2,.4,1.5), opacity 0.7s ease;
  }

  /* Lift hint while user is dragging */
  .gift-box.lifting { transition: transform 0.05s linear; }

  /* Light burst — radial flash when gift opens */
  .light-burst {
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(255,250,225,0.95) 0%,
      rgba(255,210,200,0.55) 30%,
      rgba(255,180,200,0.25) 55%,
      transparent 75%);
    transform: translate(-50%, -50%);
    pointer-events: none;
    opacity: 0;
    z-index: 7;
    filter: blur(4px);
  }
  .light-burst.bursting { animation: light-burst-anim 1.4s ease-out forwards; }
  @keyframes light-burst-anim {
    0%   { width: 0;     height: 0;     opacity: 0;   }
    20%  { opacity: 1;                                }
    100% { width: 900px; height: 900px; opacity: 0;   }
  }

  /* Swipe-up arrow indicator */
  .swipe-arrow {
    position: absolute;
    bottom: 150px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 36px;
    color: #fff;
    text-shadow: 0 2px 12px rgba(120, 30, 60, 0.5);
    animation: swipe-up-pulse 1.4s ease-in-out infinite;
    pointer-events: none;
    z-index: 20;
  }
  @keyframes swipe-up-pulse {
    0%, 100% { transform: translateX(-50%) translateY(0);    opacity: 0.55; }
    50%      { transform: translateX(-50%) translateY(-14px); opacity: 1;    }
  }
  .swipe-arrow.fade { transition: opacity 0.4s ease; opacity: 0; }

  /* ============ Scene 2: Greetings ============ */
  .scene-2 {
    background: radial-gradient(circle at 30% 25%, #FFF0F3 0%, #FFC8D4 60%, #F5A0B8 100%);
  }
  .message {
    position: relative;
    max-width: 340px;
    padding: 20px 24px;
    text-align: center;
    color: #5A2F3F;
    font-size: 19px;
    line-height: 2.1;
    letter-spacing: 0.06em;
    white-space: pre-line;
    font-weight: 500;
    text-shadow: 0 1px 2px rgba(255,255,255,0.5);
    z-index: 5;
  }
  .message::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse, rgba(255,255,255,0.4) 0%, transparent 70%);
    z-index: -1;
    filter: blur(20px);
  }
  #msg-text::after {
    content: '|';
    margin-left: 2px;
    opacity: 0.55;
    color: #C76A82;
    animation: caret-blink 0.85s steps(1) infinite;
  }
  #msg-text.done::after { display: none; }
  @keyframes caret-blink { 50% { opacity: 0; } }

  /* ============ Scene 3: Flower ============ */
  .scene-3 {
    background: radial-gradient(circle at 50% 30%, #FFEEEA 0%, #FFD0DC 60%, #E8A0B5 100%);
    perspective: 1400px;
  }
  .scene-3 .hint { top: 70px; bottom: auto; }

  .flower-stage {
    width: min(82vw, 320px);
    height: min(82vw, 320px);
    perspective: 1400px;
  }
  /* Outer wrapper handles 2D enter + sway animation */
  .flower-anim {
    width: 100%; height: 100%;
    transform-style: preserve-3d;
  }
  .scene-3.active .flower-anim {
    animation: flower-enter 1.4s cubic-bezier(.2,.7,.2,1) both,
               flower-sway 5s ease-in-out 1.4s infinite;
  }
  /* Inner card handles 3D flip — independent transform, never clobbered */
  .flower-card {
    position: relative;
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.9s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
    will-change: transform;
  }
  .flower-card.flipped {
    transform: rotateY(180deg);
  }
  @keyframes flower-enter {
    0%   { transform: scale(0) rotate(0deg); }
    100% { transform: scale(1) rotate(360deg); }
  }
  @keyframes flower-sway {
    0%, 100% { transform: rotate(-3deg); }
    50%      { transform: rotate(3deg); }
  }
  .flower-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .flower-face img {
    width: 100%; height: 100%;
    object-fit: contain;
    filter: contrast(1.04) saturate(1.08);
    pointer-events: none;
    border-radius: 12px;
    box-shadow: 0 8px 22px rgba(180, 80, 110, 0.28);
  }
  .flower-face.back { transform: rotateY(180deg); }

  /* ============ Scene 4: Card ============ */
  .scene-4 {
    background: radial-gradient(circle at 50% 30%, #FFF6EE 0%, #FFE0D0 60%, #E8C0A8 100%);
    perspective: 1600px;
  }
  .scene-4 .hint { top: 70px; bottom: auto; }

  .card-stage {
    position: relative;
    width: min(82vw, 300px);
    height: min(106vw, 380px);
    transform-style: preserve-3d;
    cursor: pointer;
    animation: card-float 4.5s ease-in-out infinite;
    filter: drop-shadow(0 12px 24px rgba(120, 60, 30, 0.35));
  }
  @keyframes card-float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  .card-inside, .card-cover {
    position: absolute;
    inset: 0;
    border-radius: 6px;
    overflow: hidden;
  }
  .card-inside img, .card-cover img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: contrast(1.03) saturate(1.05);
    pointer-events: none;
    border-radius: 6px;
  }
  .card-cover {
    transform-origin: left center;
    transition: transform 1.2s cubic-bezier(.4,0,.2,1);
    z-index: 2;
    backface-visibility: visible;
    -webkit-backface-visibility: visible;
  }
  .card-cover::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0; left: 0; width: 6px;
    background: linear-gradient(90deg, rgba(120,60,30,0.25), transparent);
    pointer-events: none;
  }
  .card-cover.opened { transform: rotateY(-160deg); }

  /* ============ Scene 5: Final photo ============ */
  .scene-5 {
    background: radial-gradient(circle at 50% 28%, #FFF4F8 0%, #FFD4E0 50%, #C49AB5 100%);
  }
  .halo {
    position: absolute;
    top: 36%;
    left: 50%;
    width: 480px; height: 480px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(255,240,250,0.85) 0%, rgba(255,180,210,0.4) 35%, transparent 70%);
    border-radius: 50%;
    animation: halo-pulse 4.5s ease-in-out infinite;
    pointer-events: none;
    filter: blur(18px);
    z-index: 1;
  }
  @keyframes halo-pulse {
    0%, 100% { opacity: 0.55; transform: translate(-50%,-50%) scale(1); }
    50%      { opacity: 1;    transform: translate(-50%,-50%) scale(1.12); }
  }
  .photo-stage {
    position: relative;
    width: min(78vw, 290px);
    height: min(98vw, 360px);
    z-index: 5;
    margin-top: -40px;
  }
  #final-photo {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 14px;
    opacity: 0;
    transform: scale(1.05);
    filter: blur(24px) saturate(1.2);
    transition: opacity 2.2s ease, filter 2.2s ease, transform 2.2s ease, box-shadow 2.2s ease;
    pointer-events: none;
    box-shadow: 0 12px 28px rgba(140, 70, 100, 0.35);
  }
  .scene-5.activated #final-photo {
    opacity: 1;
    transform: scale(1);
    filter: blur(0) saturate(1.08) contrast(1.04);
    box-shadow: 0 14px 36px rgba(140, 70, 100, 0.45);
  }
  .final-message {
    position: absolute;
    bottom: 110px;
    left: 0; right: 0;
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    color: #8B3A4A;
    text-shadow: 0 2px 14px rgba(255,255,255,0.7), 0 0 8px rgba(255,200,210,0.5);
    letter-spacing: 0.12em;
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 1.6s ease 1.6s, transform 1.6s ease 1.6s;
    z-index: 6;
  }
  .scene-5.activated .final-message { opacity: 1; transform: translateY(0); }
  .credit {
    position: absolute;
    bottom: 30px;
    left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    color: rgba(91, 47, 63, 0.7);
    letter-spacing: 0.32em;
    opacity: 0;
    transition: opacity 1.4s ease 3.4s;
    z-index: 6;
  }
  .scene-5.activated .credit { opacity: 1; }

  /* ============ Audio toggle ============ */
  .audio-toggle {
    position: absolute;
    top: 14px; right: 14px;
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #5A2F3F;
    font-size: 16px;
    line-height: 38px;
    text-align: center;
    z-index: 100;
    cursor: pointer;
    transition: transform 0.18s ease, opacity 0.4s ease;
    opacity: 0;
    visibility: hidden;
  }
  .audio-toggle.visible { opacity: 1; visibility: visible; }
  .audio-toggle:active { transform: scale(0.92); }

  /* ============ Burst petals on gift open ============ */
  .burst-petal {
    position: absolute;
    width: 14px; height: 14px;
    top: 50%; left: 50%;
    border-radius: 80% 0 80% 0;
    background: radial-gradient(ellipse at 30% 30%, #FFFFFF, #FF8FA0);
    transform: translate(-50%, -50%);
    animation: petal-burst 1.6s cubic-bezier(.2,.7,.2,1) forwards;
    pointer-events: none;
    will-change: transform, opacity;
  }
  @keyframes petal-burst {
    0%   { transform: translate(-50%,-50%) scale(0.3) rotate(0deg); opacity: 0; }
    20%  { opacity: 1; }
    100% {
      transform:
        translate(calc(-50% + var(--bx,0px)), calc(-50% + var(--by,0px)))
        scale(1) rotate(var(--br,0deg));
      opacity: 0;
    }
  }

  /* iPhone notch / safe area */
  @supports(padding: max(0px)) {
    .audio-toggle { top: max(14px, env(safe-area-inset-top)); right: max(14px, env(safe-area-inset-right)); }
    .credit { bottom: max(30px, calc(env(safe-area-inset-bottom) + 18px)); }
    .next-stage   { bottom: max(36px, calc(env(safe-area-inset-bottom) + 22px)); }
  }
</style>
</head>
<body>

<div id="app">

  <!-- Audio toggle (revealed after first gesture) -->
  <div class="audio-toggle" id="audioToggle" aria-label="切換音樂">♪</div>

  <!-- ===== Scene 1: Gift box (swipe up to open) ===== -->
  <section class="scene scene-1 active" id="scene-1">
    <div class="petal-layer" id="petals-1"></div>

    <div class="gift-stage" id="gift-stage">
      <div class="light-burst" id="light-burst"></div>
      <div class="burst-layer" id="burst-1"></div>
      <div class="gift-box" id="gift-box">
        <div class="lid">
          <div class="ribbon-h"></div>
          <div class="bow">
            <div class="bow-loop left"></div>
            <div class="bow-loop right"></div>
            <div class="bow-knot"></div>
          </div>
        </div>
        <div class="body">
          <div class="ribbon-v"></div>
        </div>
      </div>
    </div>

    <div class="swipe-arrow" id="swipe-arrow">↑</div>
    <div class="hint" id="hint-1">向上滑動打開禮物</div>
  </section>

  <!-- ===== Scene 2: Greeting (full-screen scratch transitions out) ===== -->
  <section class="scene scene-2" id="scene-2">
    <div class="hearts-layer" id="hearts-2"></div>
    <div class="message"><span id="msg-text"></span></div>
  </section>

  <!-- ===== Scene 3: Flower ===== -->
  <section class="scene scene-3" id="scene-3">
    <div class="hint dark" id="hint-3">點擊翻轉看背面 🌸</div>
    <div class="flower-stage">
      <div class="flower-anim" id="flower-anim">
        <div class="flower-card" id="flower-card">
          <div class="flower-face front">
            <img src="assets/flower-front.jpeg" alt="花正面">
          </div>
          <div class="flower-face back">
            <img src="assets/flower-back.jpeg" alt="花背面">

        </div>
      </div>
    </div>
    <div class="next-stage ribbon-stage" id="ribbon-stage">
      <div class="ribbon-wrap">
        <svg class="ribbon-svg" viewBox="0 0 280 70" preserveAspectRatio="none">
          <defs>
            <linearGradient id="rgrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stop-color="#FFE3B0"/>
              <stop offset="50%"  stop-color="#E5A155"/>
              <stop offset="100%" stop-color="#A56820"/>
            </linearGradient>
          </defs>
          <line id="rline-l" x1="115" y1="35" x2="20"  y2="35" stroke="url(#rgrad)" stroke-width="9" stroke-linecap="round"/>
          <line id="rline-r" x1="165" y1="35" x2="260" y2="35" stroke="url(#rgrad)" stroke-width="9" stroke-linecap="round"/>
          <ellipse id="rloop-l" cx="105" cy="35" rx="22" ry="15" fill="url(#rgrad)"/>
          <ellipse id="rloop-r" cx="175" cy="35" rx="22" ry="15" fill="url(#rgrad)"/>

        </svg>
        <div class="ribbon-handle left"  id="rhandle-l">◀</div>
        <div class="ribbon-handle right" id="rhandle-r">▶</div>
      </div>
      <div class="next-label">向兩側拉開緞帶</div>
    </div>
  </section>

  <!-- ===== Scene 4: Card ===== -->
  <section class="scene scene-4" id="scene-4">
    <div class="hint dark" id="hint-4">點擊打開卡片 💌</div>
    <div class="card-stage" id="card-stage">
      <div class="card-inside">
        <img src="assets/card-inside.jpeg" alt="卡片內頁">
      </div>
      <div class="card-cover" id="card-cover">
        <img src="assets/card-outside.jpeg" alt="卡片封面">
      </div>
    </div>
    <div class="next-stage envelope-stage" id="envelope-stage">
      <div class="env-burst" id="env-burst"></div>
      <div class="envelope" id="envelope">
        <div class="env-body"></div>
        <div class="env-flap"></div>
        <div class="env-stamp">💌</div>
      </div>
      <button class="env-shake-btn" id="env-shake-btn">點我搖晃 📳</button>
      <div class="next-label">搖一搖手機 📳</div>
    </div>
  </section>

  <!-- ===== Scene 5: Final ===== -->
  <section class="scene scene-5" id="scene-5">
    <div class="halo"></div>
    <div class="sparkle-layer" id="sparkles-5"></div>
    <div class="photo-stage">
      <img id="final-photo" src="assets/photo.jpeg" alt="女兒">
    </div>
    <div class="final-message">我愛您，媽媽 ❤️</div>
    <div class="credit">— 製作人　心玥 —</div>
  </section>

  <!-- ===== Full-screen scratch overlay (Scene 2 → 3) ===== -->
  <div class="fs-scratch" id="fs-scratch">
    <canvas id="fs-scratch-canvas"></canvas>
    <div class="fs-scratch-hint">手指刮開揭曉 ✨</div>
  </div>

</div>

<script>
(function () {
  'use strict';

  // ============================================================
  //  State & helpers
  // ============================================================
  const $ = (id) => document.getElementById(id);
  const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

  let currentScene = 1;
  let audioCtx = null;
  let masterGain = null;
  let musicStarted = false;
  let musicMuted = false;

  function showScene(n) {
    if (n === currentScene) return;
    document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
    const target = $('scene-' + n);
    target.classList.add('active');
    currentScene = n;
    onSceneEnter(n);
  }

  function onSceneEnter(n) {
    if (n === 2) startScene2();
    else if (n === 3) {
      setTimeout(() => {
        $('ribbon-stage').classList.add('visible');
      }, 1800);
    }
    else if (n === 4) {
      setTimeout(() => {
        $('envelope-stage').classList.add('visible');
      }, 1400);
    }
    else if (n === 5) startScene5();
  }

  // ============================================================
  //  Falling petals (scene 1)
  // ============================================================
  const PETAL_COLORS = ['#FFE0E8', '#FFB6C1', '#FF8FA0', '#FFD0DC', '#FFC0CB', '#FFA8C0'];
  function spawnPetal(layer) {
    if (!layer) return;
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.left = Math.random() * 100 + '%';
    const dur = 6 + Math.random() * 5;
    p.style.animationDuration = dur + 's';
    const c = PETAL_COLORS[(Math.random() * PETAL_COLORS.length) | 0];
    p.style.background = `radial-gradient(ellipse at 30% 30%, #FFFFFF, ${c})`;
    const size = 10 + Math.random() * 12;
    p.style.width = p.style.height = size + 'px';
    p.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
    p.style.opacity = 0.55 + Math.random() * 0.4;
    layer.appendChild(p);
    setTimeout(() => p.remove(), dur * 1000 + 200);
  }
  function petalLoop() {
    if ($('scene-1').classList.contains('active')) {
      spawnPetal($('petals-1'));
    }
  }
  setInterval(petalLoop, 380);
  // Pre-seed a few
  for (let i = 0; i < 6; i++) {
    setTimeout(() => spawnPetal($('petals-1')), i * 300);
  }

  // ============================================================
  //  Heart particles (scene 2)
  // ============================================================
  const HEART_GLYPHS = ['❤️', '💕', '💗', '💖', '🌸'];
  function spawnHeart(layer) {
    if (!layer) return;
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = HEART_GLYPHS[(Math.random() * HEART_GLYPHS.length) | 0];
    h.style.left = Math.random() * 100 + '%';
    h.style.fontSize = (12 + Math.random() * 14) + 'px';
    const dur = 5.5 + Math.random() * 3.5;
    h.style.animationDuration = dur + 's';
    h.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
    layer.appendChild(h);
    setTimeout(() => h.remove(), dur * 1000 + 200);
  }
  setInterval(() => {
    if ($('scene-2').classList.contains('active')) spawnHeart($('hearts-2'));
  }, 380);

  // ============================================================
  //  Sparkles (scene 5)
  // ============================================================
  const SPARK_GLYPHS = ['✨', '⭐', '💖', '❤️', '💫', '🌟'];
  function spawnSparkle(layer) {
    if (!layer) return;
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = SPARK_GLYPHS[(Math.random() * SPARK_GLYPHS.length) | 0];
    s.style.left = Math.random() * 100 + '%';
    s.style.top = (30 + Math.random() * 60) + '%';
    s.style.fontSize = (10 + Math.random() * 14) + 'px';
    layer.appendChild(s);
    setTimeout(() => s.remove(), 3100);
  }
  setInterval(() => {
    if ($('scene-5').classList.contains('active')) spawnSparkle($('sparkles-5'));
  }, 220);

  // ============================================================
  //  Web Audio API music (gentle C-major piano-like loop)
  // ============================================================
  const NOTES = {
    C2:65.41, D2:73.42, E2:82.41, F2:87.31, G2:98.00, A2:110.00, B2:123.47,
    C3:130.81, D3:146.83, E3:164.81, F3:174.61, G3:196.00, A3:220.00, B3:246.94,
    C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392.00, A4:440.00, B4:493.88,
    C5:523.25, D5:587.33, E5:659.25, F5:698.46, G5:783.99, A5:880.00, B5:987.77,
    C6:1046.50
  };

  const BPM = 62;
  const BEAT = 60 / BPM;
  const LOOP_BEATS = 16; // 4 bars × 4 beats

  // I – vi – IV – V progression in C
  // [note, startBeat, durationBeats, gain]
  const SCORE = [
    // ---- Bar 1: C major ----
    ['C3', 0.0, 1.5, 0.18], ['G3', 1.5, 1.0, 0.13], ['E3', 2.5, 1.5, 0.13],
    ['C5', 0.0, 1.0, 0.10], ['E5', 1.0, 1.0, 0.10], ['G5', 2.0, 1.0, 0.10], ['E5', 3.0, 1.0, 0.09],
    // ---- Bar 2: A minor ----
    ['A2', 4.0, 1.5, 0.18], ['E3', 5.5, 1.0, 0.13], ['C3', 6.5, 1.5, 0.13],
    ['A4', 4.0, 1.0, 0.10], ['C5', 5.0, 1.0, 0.10], ['E5', 6.0, 1.0, 0.10], ['C5', 7.0, 1.0, 0.09],
    // ---- Bar 3: F major ----
    ['F2', 8.0, 1.5, 0.18], ['C3', 9.5, 1.0, 0.13], ['A3',10.5, 1.5, 0.13],
    ['F4', 8.0, 1.0, 0.10], ['A4', 9.0, 1.0, 0.10], ['C5',10.0, 1.0, 0.10], ['F5',11.0, 1.0, 0.10],
    // ---- Bar 4: G major ----
    ['G2',12.0, 1.5, 0.18], ['D3',13.5, 1.0, 0.13], ['B3',14.5, 1.5, 0.13],
    ['G4',12.0, 1.0, 0.10], ['B4',13.0, 1.0, 0.10], ['D5',14.0, 1.0, 0.10], ['G5',15.0, 1.0, 0.09]
  ];

  let nextLoopStart = 0;

  function ensureAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.0001;

      const lpf = audioCtx.createBiquadFilter();
      lpf.type = 'lowpass';
      lpf.frequency.value = 4200;
      lpf.Q.value = 0.4;

      const reverb = audioCtx.createGain(); // simple echo gain (no real convolver to keep it light)
      reverb.gain.value = 1;

      masterGain.connect(lpf);
      lpf.connect(reverb);
      reverb.connect(audioCtx.destination);

      const now = audioCtx.currentTime;
      masterGain.gain.exponentialRampToValueAtTime(0.22, now + 3);
    } catch (e) {
      console.warn('AudioContext init failed', e);
    }
  }

  function resumeAudio() {
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume().catch(() => {});
    }
  }

  function startMusic() {
    if (musicStarted || !audioCtx) return;
    musicStarted = true;
    nextLoopStart = audioCtx.currentTime + 0.25;
    scheduleLoops();
    setInterval(scheduleLoops, 1500);
    $('audioToggle').classList.add('visible');
  }

  function scheduleLoops() {
    if (!audioCtx || musicMuted) return;
    const now = audioCtx.currentTime;
    const lookAhead = now + 4.0;
    while (nextLoopStart < lookAhead) {
      for (let i = 0; i < SCORE.length; i++) {
        const [note, b, d, g] = SCORE[i];
        const t = nextLoopStart + b * BEAT;
        if (t > now - 0.05) {
          playPianoNote(NOTES[note], t, d * BEAT, g);
        }
      }
      nextLoopStart += LOOP_BEATS * BEAT;
    }
  }

  function playPianoNote(freq, time, duration, gain) {
    if (!audioCtx) return;
    // Two oscillators: triangle (body) + sine (shimmer 1 octave up).
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const env  = audioCtx.createGain();
    const shimmer = audioCtx.createGain();

    osc1.type = 'triangle';
    osc2.type = 'sine';
    osc1.frequency.value = freq;
    osc2.frequency.value = freq * 2.0;

    shimmer.gain.value = 0.45;

    osc1.connect(env);
    osc2.connect(shimmer);
    shimmer.connect(env);
    env.connect(masterGain);

    // Soft piano-like envelope: fast attack, exponential decay
    const attack = 0.012;
    env.gain.setValueAtTime(0.0001, time);
    env.gain.exponentialRampToValueAtTime(Math.max(0.0001, gain), time + attack);
    env.gain.exponentialRampToValueAtTime(0.0001, time + duration);

    osc1.start(time);
    osc2.start(time);
    osc1.stop(time + duration + 0.08);
    osc2.stop(time + duration + 0.08);
  }

  function swellMusic() {
    if (!masterGain || !audioCtx) return;
    const now = audioCtx.currentTime;
    masterGain.gain.cancelScheduledValues(now);
    masterGain.gain.setValueAtTime(masterGain.gain.value, now);
    masterGain.gain.exponentialRampToValueAtTime(0.38, now + 5);
  }

  function toggleMute() {
    if (!masterGain || !audioCtx) return;
    musicMuted = !musicMuted;
    const now = audioCtx.currentTime;
    masterGain.gain.cancelScheduledValues(now);
    if (musicMuted) {
      masterGain.gain.setValueAtTime(masterGain.gain.value, now);
      masterGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
      $('audioToggle').textContent = '♪̸';
    } else {
      masterGain.gain.setValueAtTime(masterGain.gain.value, now);
      masterGain.gain.exponentialRampToValueAtTime(0.25, now + 1.2);
      $('audioToggle').textContent = '♪';
    }
  }
  $('audioToggle').addEventListener('click', toggleMute);

  // ============================================================
  //  Scene 1: Swipe up to open the gift
  // ============================================================
  let opened = false;

  function setupSwipeUp() {
    const scene = $('scene-1');
    const giftBox = $('gift-box');
    let tracking = false;
    let startY = 0, startX = 0, startTime = 0, lastDy = 0;

    function pos(e) {
      const t = (e.touches && e.touches[0]) ? e.touches[0]
              : (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0] : e;
      return { x: t.clientX, y: t.clientY };
    }

    function start(e) {
      if (opened) return;
      onFirstInteraction();
      const p = pos(e);
      startY = p.y; startX = p.x; startTime = Date.now();
      tracking = true;
      lastDy = 0;
      giftBox.classList.add('lifting');
      // hide hint as soon as user starts dragging
      $('hint-1').style.transition = 'opacity 0.4s ease';
      $('hint-1').style.opacity = '0';
      $('swipe-arrow').classList.add('fade');
    }
    function move(e) {
      if (!tracking || opened) return;
      const p = pos(e);
      const dy = startY - p.y;            // upward = positive
      const dx = Math.abs(p.x - startX);
      // ignore if the drag is mostly horizontal
      if (dy < -8 || dx > Math.max(40, dy)) return;
      if (e.cancelable) e.preventDefault();
      lastDy = Math.max(0, dy);
      const lift = Math.min(140, lastDy * 0.9);
      const tilt = Math.min(8, lastDy * 0.05);
      giftBox.style.transform = `translateY(${-lift}px) rotate(${-tilt * 0.4}deg) scale(${1 + lift * 0.0015})`;
      // early trigger if pulled far enough
      if (lastDy > 130) finish();
    }
    function end(e) {
      if (!tracking) return;
      tracking = false;
      giftBox.classList.remove('lifting');
      const dt = Date.now() - startTime;
      const velocity = lastDy / Math.max(1, dt); // px per ms
      if (lastDy > 60 || (lastDy > 25 && velocity > 0.5)) {
        finish();
      } else {
        // snap back
        giftBox.style.transition = 'transform 0.35s cubic-bezier(.2,1,.4,1)';
        giftBox.style.transform = '';
        $('hint-1').style.opacity = '0.85';
        $('swipe-arrow').classList.remove('fade');
        setTimeout(() => { giftBox.style.transition = ''; }, 380);
      }
    }
    function finish() {
      if (opened) return;
      opened = true;
      // clear inline transform so .opened class transitions cleanly
      giftBox.style.transition = '';
      giftBox.style.transform = '';
      // next frame: trigger opening
      requestAnimationFrame(() => {
        giftBox.classList.add('opened');
        $('light-burst').classList.add('bursting');
        burstFromGift();
      });
      setTimeout(() => showScene(2), 1300);
    }

    scene.addEventListener('mousedown',  start);
    scene.addEventListener('mousemove',  move);
    window.addEventListener('mouseup',   end);
    scene.addEventListener('touchstart', start, { passive: true });
    scene.addEventListener('touchmove',  move,  { passive: false });
    scene.addEventListener('touchend',   end);
    scene.addEventListener('touchcancel',end);
  }

  function burstFromGift() {
    const layer = $('burst-1');
    for (let i = 0; i < 24; i++) {
      const p = document.createElement('div');
      p.className = 'burst-petal';
      const angle = (Math.PI * 2 * i) / 24 + Math.random() * 0.4;
      const dist = 150 + Math.random() * 240;
      p.style.setProperty('--bx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--by', Math.sin(angle) * dist - 80 + 'px');
      p.style.setProperty('--br', (Math.random() * 720 - 360) + 'deg');
      const c = PETAL_COLORS[(Math.random() * PETAL_COLORS.length) | 0];
      p.style.background = `radial-gradient(ellipse at 30% 30%, #FFFFFF, ${c})`;
      const size = 12 + Math.random() * 14;
      p.style.width = p.style.height = size + 'px';
      p.style.animationDelay = (Math.random() * 0.15) + 's';
      layer.appendChild(p);
      setTimeout(() => p.remove(), 2000);
    }
  }

  setupSwipeUp();

  // ============================================================
  //  First user interaction → kickstart audio
  // ============================================================
  let firstInteractionDone = false;
  function onFirstInteraction() {
    if (firstInteractionDone) return;
    firstInteractionDone = true;
    ensureAudio();
    resumeAudio();
    startMusic();
  }
  // global fallback
  ['touchstart', 'click'].forEach(ev =>
    document.addEventListener(ev, onFirstInteraction, { once: true, passive: true })
  );

  // ============================================================
  //  Scene 2: Typewriter
  // ============================================================
  const MESSAGE = '媽媽，謝謝您這麼多年的陪伴與愛。\n您的笑容是我最美的風景，\n您的擁抱是我最溫暖的港灣。\n母親節快樂 💕';
  let scene2Started = false;

  function startScene2() {
    if (scene2Started) return;
    scene2Started = true;
    const el = $('msg-text');
    el.textContent = '';
    let i = 0;
    function step() {
      if (!$('scene-2').classList.contains('active')) return;
      if (i >= MESSAGE.length) {
        el.classList.add('done');
        // After a short pause, raise the full-screen scratch overlay
        setTimeout(() => {
          if (fsScratchHandler) fsScratchHandler.show();
        }, 1200);
        return;
      }
      el.textContent = MESSAGE.slice(0, i + 1);
      i++;
      const ch = MESSAGE[i - 1];
      const delay = (ch === '\n') ? 380 : (ch === '，' || ch === '。') ? 280 : (90 + Math.random() * 60);
      setTimeout(step, delay);
    }
    setTimeout(step, 700);
  }

  // ============================================================
  //  Scene 3: Flower flip (click flower)
  // ============================================================
  $('flower-card').addEventListener('click', () => {
    onFirstInteraction();
    $('flower-card').classList.toggle('flipped');
    $('hint-3').style.transition = 'opacity 0.5s ease';
    $('hint-3').style.opacity = '0';
  });

  // ============================================================
  //  Scene 4: Card open (click card)
  // ============================================================
  $('card-stage').addEventListener('click', () => {
    onFirstInteraction();
    $('card-cover').classList.toggle('opened');
    $('hint-4').style.transition = 'opacity 0.5s ease';
    $('hint-4').style.opacity = '0';
  });

  // ============================================================
  //  Transition B: Full-screen scratch-off (Scene 2 → 3)
  // ============================================================
  function setupFsScratch() {
    const canvas = $('fs-scratch-canvas');
    const overlay = $('fs-scratch');
    const sctx = canvas.getContext('2d');
    const sdpr = Math.min(window.devicePixelRatio || 1, 2);
    let drawing = false, lx = 0, ly = 0;
    let lastSample = 0, done = false, ready = false;

    function size() {
      const r = canvas.getBoundingClientRect();
      if (r.width < 4 || r.height < 4) return;
      canvas.width  = (r.width  * sdpr) | 0;
      canvas.height = (r.height * sdpr) | 0;
      drawGold();
      ready = true;
    }
    function drawGold() {
      const w = canvas.width, h = canvas.height;
      sctx.globalCompositeOperation = 'source-over';
      // base diagonal gold gradient
      const g = sctx.createLinearGradient(0, 0, w, h);
      g.addColorStop(0,    '#B8862E');
      g.addColorStop(0.2,  '#FFE9A8');
      g.addColorStop(0.5,  '#E5B250');
      g.addColorStop(0.8,  '#FFE9A8');
      g.addColorStop(1,    '#A6791C');
      sctx.fillStyle = g;
      sctx.fillRect(0, 0, w, h);

      // shimmering diagonal stripes
      sctx.save();
      sctx.translate(w / 2, h / 2);
      sctx.rotate(Math.PI / 4);
      sctx.fillStyle = 'rgba(255,255,255,0.10)';
      const diag = Math.hypot(w, h);
      for (let x = -diag; x < diag; x += 60 * sdpr) {
        sctx.fillRect(x, -diag, 22 * sdpr, diag * 2);
      }
      sctx.restore();

      // sparkles
      sctx.fillStyle = 'rgba(255,255,255,0.55)';
      for (let i = 0; i < 80; i++) {
        const x = Math.random() * w, y = Math.random() * h;
        sctx.beginPath();
        sctx.arc(x, y, (1 + Math.random() * 2) * sdpr, 0, Math.PI * 2);
        sctx.fill();
      }
      // bigger glints
      sctx.fillStyle = 'rgba(255,255,255,0.85)';
      for (let i = 0; i < 12; i++) {
        const x = Math.random() * w, y = Math.random() * h;
        const r = (2 + Math.random() * 2) * sdpr;
        sctx.beginPath();
        sctx.arc(x, y, r, 0, Math.PI * 2);
        sctx.fill();
      }

      // central text
      sctx.fillStyle = 'rgba(110, 60, 15, 0.78)';
      sctx.font = `bold ${28 * sdpr}px "Noto Serif TC", serif`;
      sctx.textAlign = 'center';
      sctx.textBaseline = 'middle';
      sctx.fillText('刮 開 揭 曉', w / 2, h / 2 - 20 * sdpr);
      sctx.font = `${16 * sdpr}px "Noto Serif TC", serif`;
      sctx.fillStyle = 'rgba(110, 60, 15, 0.6)';
      sctx.fillText('✨ 下 一 段 旅 程 ✨', w / 2, h / 2 + 20 * sdpr);

      // soft vignette to draw the eye inward
      const vg = sctx.createRadialGradient(w/2, h/2, w*0.2, w/2, h/2, Math.max(w,h)*0.7);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, 'rgba(80,40,10,0.35)');
      sctx.fillStyle = vg;
      sctx.fillRect(0, 0, w, h);
    }
    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      return { x: (t.clientX - r.left) * sdpr, y: (t.clientY - r.top) * sdpr };
    }
    function start(e) {
      if (done || !ready) return;
      if (e.cancelable) e.preventDefault();
      onFirstInteraction();
      drawing = true;
      const p = getPos(e);
      lx = p.x; ly = p.y;
      sctx.globalCompositeOperation = 'destination-out';
      sctx.beginPath();
      sctx.arc(p.x, p.y, 38 * sdpr, 0, Math.PI * 2);
      sctx.fill();
    }
    function move(e) {
      if (!drawing || done) return;
      if (e.cancelable) e.preventDefault();
      const p = getPos(e);
      sctx.globalCompositeOperation = 'destination-out';
      sctx.lineCap = 'round';
      sctx.lineJoin = 'round';
      sctx.lineWidth = 76 * sdpr;
      sctx.beginPath();
      sctx.moveTo(lx, ly);
      sctx.lineTo(p.x, p.y);
      sctx.stroke();
      // ragged scratch edges
      const dx = p.x - lx, dy = p.y - ly;
      const dist = Math.hypot(dx, dy);
      const steps = Math.max(1, (dist / (16 * sdpr)) | 0);
      for (let i = 0; i < steps; i++) {
        const t = i / steps;
        const cx = lx + dx * t + (Math.random() - 0.5) * 22 * sdpr;
        const cy = ly + dy * t + (Math.random() - 0.5) * 22 * sdpr;
        const r  = (10 + Math.random() * 16) * sdpr;
        sctx.beginPath();
        sctx.arc(cx, cy, r, 0, Math.PI * 2);
        sctx.fill();
      }
      lx = p.x; ly = p.y;
      sample();
    }
    function end() { drawing = false; }
    function sample() {
      const now = performance.now();
      if (now - lastSample < 180 || done) return;
      lastSample = now;
      try {
        const w = canvas.width, h = canvas.height;
        const data = sctx.getImageData(0, 0, w, h).data;
        let cleared = 0, total = 0;
        for (let i = 3; i < data.length; i += 4 * 80) {
          if (data[i] === 0) cleared++;
          total++;
        }
        if (cleared / total > 0.6) {
          done = true;
          // hint disappears, overlay fades, advance to scene 3
          overlay.classList.add('fading');
          setTimeout(() => {
            overlay.classList.remove('visible', 'fading');
            showScene(3);
          }, 750);
        }
      } catch (e) {}
    }

    canvas.addEventListener('mousedown',  start);
    canvas.addEventListener('mousemove',  move);
    window.addEventListener('mouseup',    end);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove',  move,  { passive: false });
    canvas.addEventListener('touchend',   end);
    canvas.addEventListener('touchcancel', end);

    window.addEventListener('resize', () => { if (!done) size(); });

    return { init: size, show: () => {
      overlay.classList.add('visible');
      requestAnimationFrame(size);
    }};
  }

  // ============================================================
  //  Transition C: Ribbon untie (Scene 3 → 4)
  // ============================================================
  function setupRibbon() {
    const lh   = $('rhandle-l');
    const rh   = $('rhandle-r');
    const ll   = $('rline-l');
    const rl   = $('rline-r');
    const bl   = $('rloop-l');
    const br   = $('rloop-r');
    const knot = $('rknot');

    const THRESHOLD = 60;
    let leftPulled = 0, rightPulled = 0;
    let triggered = false;

    function updateLoop(loop, pulled) {
      const t = Math.min(1, pulled / THRESHOLD);
      loop.setAttribute('rx', String(22 - t * 18));
      loop.setAttribute('ry', String(15 - t * 8));
      loop.style.opacity = String(1 - t * 0.45);
    }

    function bindHandle(handle, side) {
      let active = false, startX = 0, startPull = 0;

      function down(e) {
        if (triggered) return;
        e.preventDefault();
        e.stopPropagation();
        onFirstInteraction();
        active = true;
        const t = e.touches ? e.touches[0] : e;
        startX = t.clientX;
        startPull = side === 'left' ? leftPulled : rightPulled;
        handle.classList.add('dragging');
      }
      function moveEv(e) {
        if (!active || triggered) return;
        e.preventDefault();
        const t = e.touches ? e.touches[0] : e;
        const dx = t.clientX - startX;
        const pulled = Math.max(0, Math.min(THRESHOLD * 1.6,
          startPull + (side === 'left' ? -dx : dx)));
        if (side === 'left') {
          leftPulled = pulled;
          handle.style.transform = `translateX(${-pulled}px)`;
          updateLoop(bl, pulled);
        } else {
          rightPulled = pulled;
          handle.style.transform = `translateX(${pulled}px)`;
          updateLoop(br, pulled);
        }
        if (leftPulled >= THRESHOLD && rightPulled >= THRESHOLD) {
          triggered = true;
          untie();
        }
      }
      function up() {
        if (!active) return;
        active = false;
        handle.classList.remove('dragging');
      }

      handle.addEventListener('mousedown',  down);
      handle.addEventListener('touchstart', down, { passive: false });
      document.addEventListener('mousemove',  moveEv);
      document.addEventListener('touchmove',  moveEv, { passive: false });
      document.addEventListener('mouseup',    up);
      document.addEventListener('touchend',   up);
      document.addEventListener('touchcancel',up);
    }

    bindHandle(lh, 'left');
    bindHandle(rh, 'right');

    function untie() {
      bl.style.transition = 'transform 0.95s cubic-bezier(.3,.6,.3,1), opacity 0.9s ease';
      br.style.transition = 'transform 0.95s cubic-bezier(.3,.6,.3,1), opacity 0.9s ease';
      bl.style.transform  = 'translate(-220px, -110px) scale(0.2) rotate(-540deg)';
      br.style.transform  = 'translate( 220px, -110px) scale(0.2) rotate( 540deg)';
      bl.style.opacity = '0';
      br.style.opacity = '0';
      knot.style.transition = 'transform 0.7s ease, opacity 0.6s ease';
      knot.style.transform  = 'translateY(90px) rotate(180deg) scale(0.4)';
      knot.style.opacity = '0';
      ll.style.transition = 'opacity 0.5s ease, transform 0.6s ease';
      rl.style.transition = 'opacity 0.5s ease, transform 0.6s ease';
      ll.style.transform  = 'translateX(-30px)';
      rl.style.transform  = 'translateX( 30px)';
      ll.style.opacity = '0';
      rl.style.opacity = '0';
      lh.style.transition = 'opacity 0.5s ease';
      rh.style.transition = 'opacity 0.5s ease';
      lh.style.opacity = '0';
      rh.style.opacity = '0';
      lh.style.pointerEvents = 'none';
      rh.style.pointerEvents = 'none';
      setTimeout(() => showScene(4), 1050);
    }
  }

  // ============================================================
  //  Transition D: Envelope shake (Scene 4 → 5)
  // ============================================================
  function setupEnvelope() {
    const env  = $('envelope');
    const btn  = $('env-shake-btn');
    const burstLayer = $('env-burst');
    let triggered = false;
    let shakeAccum = 0;
    let motionListening = false;

    function trigger() {
      if (triggered) return;
      triggered = true;
      env.classList.remove('shaking');
      env.classList.add('opened');
      burstFromEnvelope();
      setTimeout(() => showScene(5), 1150);
    }

    function burstFromEnvelope() {
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'burst-petal';
        const ang  = (Math.PI * 2 * i / 20) - Math.PI / 2 + (Math.random() - 0.5) * 0.6;
        const dist = 70 + Math.random() * 130;
        p.style.setProperty('--bx', Math.cos(ang) * dist + 'px');
        p.style.setProperty('--by', (Math.sin(ang) * dist - 40) + 'px');
        p.style.setProperty('--br', (Math.random() * 720 - 360) + 'deg');
        const c = PETAL_COLORS[(Math.random() * PETAL_COLORS.length) | 0];
        p.style.background = `radial-gradient(ellipse at 30% 30%, #FFFFFF, ${c})`;
        const sz = 10 + Math.random() * 12;
        p.style.width = p.style.height = sz + 'px';
        p.style.animationDelay = (Math.random() * 0.18) + 's';
        burstLayer.appendChild(p);
        setTimeout(() => p.remove(), 1900);
      }
    }

    function onMotion(e) {
      if (triggered) return;
      const a = e.accelerationIncludingGravity || e.acceleration;
      if (!a) return;
      const mag = Math.hypot(a.x || 0, a.y || 0, a.z || 0);
      const dyn = Math.abs(mag - 9.8);
      if (dyn > 7) {
        shakeAccum += dyn;
        env.classList.add('shaking');
      } else {
        shakeAccum *= 0.9;
        if (shakeAccum < 4) env.classList.remove('shaking');
      }
      if (shakeAccum > 80) trigger();
    }

    function attachMotion() {
      if (motionListening) return;
      if (typeof DeviceMotionEvent === 'undefined') return;
      window.addEventListener('devicemotion', onMotion);
      motionListening = true;
    }

    // Try to listen passively (Android/desktop don't need permission)
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission !== 'function') {
      attachMotion();
    }

    btn.addEventListener('click', () => {
      onFirstInteraction();
      // iOS 13+ requires explicit permission inside a user gesture.
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission()
          .then(r => { if (r === 'granted') attachMotion(); })
          .catch(() => {});
      }
      // The button itself is also a fallback trigger.
      trigger();
    });
  }

  const fsScratchHandler = setupFsScratch();
  setupRibbon();
  setupEnvelope();

  // ============================================================
  //  Scene 5: Final reveal
  // ============================================================
  function startScene5() {
    setTimeout(() => $('scene-5').classList.add('activated'), 250);
    swellMusic();
  }

  // ============================================================
  //  Init
  // ============================================================

  // Prevent double-tap zoom on iOS Safari
  let lastTouchEnd = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, { passive: false });

  // Prevent context menu on long press
  document.addEventListener('contextmenu', (e) => e.preventDefault());

  // Resume audio on visibility change
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) resumeAudio();
  });
})();
</script>
